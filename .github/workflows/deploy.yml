name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  docker:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Login DockerHub
        uses: docker/login-action@v3

        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Frontend

        run: |
          docker build -t unknownsourceofhell/lacsohub-frontend:latest ./frontend

      - name: Push Frontend

        run: |
          docker push unknownsourceofhell/lacsohub-frontend:latest

      - name: Build Backend

        run: |
          docker build -t unknownsourceofhell/lacsohub-backend:latest ./backend

      - name: Push Backend

        run: |
          docker push unknownsourceofhell/lacsohub-backend:latest

      - name: Deploy EC2

        uses: appleboy/ssh-action@v1.2.0

        with:

          host: ${{ secrets.EC2_HOST }}

          username: ${{ secrets.EC2_USER }}

          key: ${{ secrets.EC2_KEY }}

          script: |

            docker pull unknownsourceofhell/lacsohub-frontend:latest

            docker pull unknownsourceofhell/lacsohub-backend:latest

            kubectl rollout restart deployment/frontend -n lacsohub

            kubectl rollout restart deployment/backend -n lacsohub

            kubectl rollout status deployment/frontend -n lacsohub

            kubectl rollout status deployment/backend -n lacsohub
